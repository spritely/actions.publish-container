name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@9c2f1d17c09991bc7686557115b58f4bd91abb67 # v0.7.14

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@9c2f1d17c09991bc7686557115b58f4bd91abb67 # v0.7.14
        with:
          version: ${{ steps.version.outputs.version }}

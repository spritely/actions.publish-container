name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@97cbd88eb416278190d3048d5c2afa55d1a9847c # v0.7.26

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@97cbd88eb416278190d3048d5c2afa55d1a9847c # v0.7.26
        with:
          version: ${{ steps.version.outputs.version }}

name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@917ad64365781423089cce6ec4872f981f6da167 # v0.7.21

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@917ad64365781423089cce6ec4872f981f6da167 # v0.7.21
        with:
          version: ${{ steps.version.outputs.version }}

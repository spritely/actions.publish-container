name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@41d19a45229f6d9d2b8ec26c6d8f651215896734 # v0.7.27

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@41d19a45229f6d9d2b8ec26c6d8f651215896734 # v0.7.27
        with:
          version: ${{ steps.version.outputs.version }}

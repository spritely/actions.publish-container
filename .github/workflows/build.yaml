name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@ca66b36474ee5ffaa61b50940a43d2f8b21fcebe # v0.7.9

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@ca66b36474ee5ffaa61b50940a43d2f8b21fcebe # v0.7.9
        with:
          version: ${{ steps.version.outputs.version }}

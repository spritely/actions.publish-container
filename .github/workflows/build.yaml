name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@eb32d2b614df859aed2c9880de1c4fbc79f11b93 # v0.7.28

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@eb32d2b614df859aed2c9880de1c4fbc79f11b93 # v0.7.28
        with:
          version: ${{ steps.version.outputs.version }}

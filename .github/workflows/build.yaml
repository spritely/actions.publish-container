name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@c26544686f0608c74521f8fd0d4036b14d41c9e2 # v0.7.19

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@c26544686f0608c74521f8fd0d4036b14d41c9e2 # v0.7.19
        with:
          version: ${{ steps.version.outputs.version }}

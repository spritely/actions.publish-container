name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@e0c9d750cdb05922d5ee59ffb7c32da8f83514d3 # v0.7.24

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@e0c9d750cdb05922d5ee59ffb7c32da8f83514d3 # v0.7.24
        with:
          version: ${{ steps.version.outputs.version }}

name: Build

on: [push, workflow_dispatch]

jobs:
  run-tests:
    name: Build and Test
    runs-on: ubuntu-24.04
    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@498f09befd2aa1a2e6edc02d5d2856db5d1ad304 # v0.7.13

      - name: Run tests
        uses: ./tests

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@498f09befd2aa1a2e6edc02d5d2856db5d1ad304 # v0.7.13
        with:
          version: ${{ steps.version.outputs.version }}
